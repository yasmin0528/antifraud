# AML 数据集配置
data:
  dataset: "aml"
  data_path: "../../../autodl-tmp/dataset.csv"
  preprocessed_path: "../../../autodl-tmp/preprocessed_cache/preprocessed_aml.pt"
  regenerate: false
  val_ratio: 0.1
  test_ratio: 0.1
  use_smote: true   # 从 default.yaml 继承，显式确认开启 SMOTE
  smote_ratio: 1.0
  batch_size: 32
  window_size: 10
  num_workers: 0

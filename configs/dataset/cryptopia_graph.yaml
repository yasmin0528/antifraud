# Deprecated compatibility alias. Use cryptopia.yaml for formal experiments.
data:
  dataset: "cryptopia_graph"
  data_path: "../../CryptopiaHacker"
  preprocessed_path: "../../preprocessed_cache/preprocessed_cryptopia.pt"
  regenerate: false
  val_ratio: 0.1
  test_ratio: 0.1
  use_smote: false
  batch_size: 256
  window_size: 50
  num_workers: 0

model:
  ca1:
    feature_dim: 3
    hidden_dim: 128
  edge_attr_dim: 3

train:
  pos_weight: 5.0
  focal_gamma: 2.0
  rpe_beta: 1.5

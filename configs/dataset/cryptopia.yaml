# CryptopiaHacker unified graph-based dataset config.
data:
  dataset: "cryptopia"
  data_path: "../../../autodl-tmp/CryptopiaHacker"
  preprocessed_path: "../../../autodl-tmp/preprocessed_cache/preprocessed_cryptopia.pt"
  regenerate: false
  val_ratio: 0.1
  test_ratio: 0.1
  use_smote: false
  smote_ratio: 1.0
  batch_size: 256
  num_workers: 0
  window_size: 50

model:
  ca1:
    feature_dim: 3
    hidden_dim: 128
  edge_attr_dim: 3

train:
  pos_weight: 5.0
  focal_gamma: 2.0
  rpe_beta: 1.5
